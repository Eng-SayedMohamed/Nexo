<div
  class="min-h-screen bg-white dark:bg-gray-900 flex items-center justify-center px-6 py-24 sm:py-32 lg:px-8"
>
  <div class="text-center">
    <p class="text-base font-semibold text-indigo-600 dark:text-indigo-400">
      {{ 'not_found.code' | translate }}
    </p>
    <h1 class="mt-4 text-3xl font-bold tracking-tight text-gray-900 dark:text-white sm:text-5xl">
      {{ 'not_found.title' | translate }}
    </h1>
    <p class="mt-6 text-base leading-7 text-gray-600 dark:text-gray-400">
      {{ 'not_found.description' | translate }}
    </p>

    <div class="mt-10 flex items-center justify-center">
      <svg
        class="w-64 h-64 text-gray-200 dark:text-gray-800 animate-pulse"
        fill="currentColor"
        viewBox="0 0 24 24"
      >
        <path
          d="M13 13h-2V7h2m0 10h-2v-2h2M12 2A10 10 0 002 12a10 10 0 0010 10 10 10 0 0010-10A10 10 0 0012 2z"
        ></path>
      </svg>
    </div>

    <div class="mt-10 flex items-center justify-center gap-x-6">
      <a
        routerLink="/home"
        class="rounded-md bg-indigo-600 px-5 py-3 text-sm font-semibold text-white shadow-sm hover:bg-indigo-500 focus-visible:outline focus-visible:outline-offset-2 focus-visible:outline-indigo-600 transition-all transform hover:scale-105"
      >
        {{ 'not_found.home' | translate }}
      </a>
      <button
        (click)="goBack()"
        class="text-sm font-semibold text-gray-900 dark:text-gray-200 hover:text-indigo-600 transition-colors"
      >
        {{ 'not_found.previous' | translate }}
      </button>
    </div>

    <div class="mt-16 border-t border-gray-100 dark:border-gray-800 pt-8">
      <p class="text-sm text-gray-500">
        {{ 'not_found.lost' | translate }}
        <a href="/support" class="font-medium text-indigo-600 hover:text-indigo-500">{{
          'not_found.contact_support' | translate
        }}</a>
      </p>
    </div>
  </div>
</div>
